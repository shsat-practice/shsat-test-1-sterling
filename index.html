<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHSAT Practice Test A</title>
<style>
  :root{
    --ink:#1f2933; --ink-soft:#3e4c59; --muted:#7b8794; --line:#d6dbe0;
    --paper:#ffffff; --bg:#eef0f2; --bar:#5b6470; --bar-ink:#f4f6f8;
    --accent:#1f5fbf; --accent-dark:#17478f; --accent-soft:#e8f0fb;
    --correct:#2f7d4f; --pick:#1f5fbf; --box:#c3cad2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:Georgia,'Times New Roman',serif;
    color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  .ui{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

  /* top toolbar */
  .toolbar{
    position:sticky; top:0; z-index:20; background:#fbfcfd;
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:.5rem; padding:.55rem .8rem;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  .nav-btns{display:flex; gap:.4rem}
  .btn{
    font:inherit; font-size:.9rem; border:1px solid #b9c2cc; background:#fff;
    color:var(--ink); border-radius:6px; padding:.42rem .7rem; cursor:pointer;
    display:inline-flex; align-items:center; gap:.35rem; line-height:1;
  }
  .btn:hover{background:#f2f5f8}
  .btn:disabled{opacity:.4; cursor:not-allowed}
  .btn.arrow{background:var(--accent); border-color:var(--accent-dark); color:#fff; font-weight:600; min-width:52px; justify-content:center}
  .btn.arrow:hover:not(:disabled){background:var(--accent-dark)}
  .btn.arrow:disabled{background:#c7d2de; border-color:#c7d2de; color:#eef2f7}
  .spacer{flex:1}
  .guest{color:var(--muted); font-size:.9rem; display:flex; align-items:center; gap:.45rem}
  .guest .av{width:26px;height:26px;border:1px solid #b9c2cc;border-radius:5px;display:grid;place-items:center;font-size:.8rem}

  /* progress strip */
  .crumb{
    background:var(--bar); color:var(--bar-ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    font-size:.72rem; letter-spacing:.04em; text-transform:uppercase;
    display:flex; align-items:center; gap:.6rem; padding:.5rem .9rem;
  }
  .crumb .sep{opacity:.5}
  .crumb .prog-wrap{flex:1; display:flex; align-items:center; gap:.6rem; max-width:520px}
  .crumb .prog{flex:1; height:8px; background:#454d58; border-radius:20px; overflow:hidden}
  .crumb .prog i{display:block; height:100%; width:0; background:#aeb8c4; transition:width .25s}
  .crumb .pct{font-variant-numeric:tabular-nums; min-width:34px}

  /* stage */
  .stage{max-width:1120px; margin:0 auto; padding:1.4rem 1rem 3rem}
  .card{background:var(--paper); border:1px solid var(--line); border-radius:10px; box-shadow:0 1px 2px rgba(20,30,40,.05)}

  /* two-column question layout */
  .qwrap{display:grid; grid-template-columns:1fr 1fr; gap:1.1rem; align-items:start}
  .qwrap.single{grid-template-columns:1fr; max-width:760px; margin:0 auto}
  @media (max-width:820px){ .qwrap{grid-template-columns:1fr} }

  .panel{padding:1.15rem 1.25rem}
  .passage{max-height:none}
  .passage-scroll{border:1px solid var(--line); border-radius:8px; padding:1rem 1.15rem; background:#fcfcfa; max-height:72vh; overflow:auto}
  .passage-title{text-align:center; font-weight:700; font-size:1.06rem; margin:.1rem 0 .1rem}
  .passage-attr{text-align:left; font-size:.9rem; color:var(--ink-soft); margin:.5rem 0 1rem; font-style:italic}
  .ptext{line-height:1.62; font-size:1rem}
  .ptext p{margin:0 0 1rem; position:relative}
  .ptext.numbered p{padding-left:2.1rem}
  .ptext.numbered p .pn{position:absolute; left:0; top:.05rem; font-size:.82rem; font-style:italic; color:var(--muted)}
  /* poem */
  .ptext.poem{line-height:1.5}
  .ptext.poem .pline{margin:0 0 .12rem; padding-left:2.4rem}
  .ptext.poem .pline .lno{position:absolute; left:0; width:1.9rem; text-align:right; font-size:.78rem; color:var(--muted); font-style:italic}
  .poem-missing{border:1px dashed #c7a94a; background:#fdf8ea; border-radius:8px; padding:1rem 1.1rem; font-family:-apple-system,sans-serif; font-size:.9rem; line-height:1.5; color:#6b551d; display:flex; flex-direction:column; gap:.4rem}
  .poem-missing code{background:#f0e6c8; padding:.05rem .3rem; border-radius:4px; font-size:.85em}
  /* figure/diagram */
  .pfig{margin:1.1rem 0 .2rem; text-align:center}
  .pfig img{max-width:100%; width:auto; max-height:min(40vh,300px); height:auto; border:1px solid var(--line); border-radius:6px; background:#fff}
  .pfig figcaption{font-family:-apple-system,sans-serif; font-size:.8rem; color:var(--muted); margin-top:.4rem; line-height:1.4}
  /* math bits */
  .mdisplay{text-align:center; font-size:1.25rem; margin:.4rem 0 1.1rem; line-height:1.4}
  .databox{font-family:'Courier New',monospace; font-weight:700; font-size:1.05rem; letter-spacing:.02em; background:#f7f9fb; border:1px solid var(--line); border-radius:8px; padding:.8rem 1rem; margin:0 0 .9rem; text-align:center; line-height:1.9}
  .qfig{margin:.6rem 0 1rem; text-align:center}
  /* Cap figure height so the question + diagram fits one laptop screen,
     but keep a comfortable floor so math stays readable. */
  .qfig img{max-width:100%; width:auto; max-height:min(46vh,340px); height:auto; border:1px solid var(--line); border-radius:6px; background:#fff}
  .frac{display:inline-flex; flex-direction:column; vertical-align:middle; text-align:center; margin:0 .12em; line-height:1.05}
  .frac .num{border-bottom:1.6px solid currentColor; padding:0 .35em .06em}
  .frac .den{padding:.06em .35em 0}
  /* grid-in */
  .gridin{display:flex; flex-direction:column; gap:.5rem; max-width:320px}
  .gridin label{font-family:-apple-system,sans-serif; font-size:.8rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--muted)}
  .gi-input{font-family:'Courier New',monospace; font-size:1.5rem; padding:.6rem .8rem; border:2px solid var(--box); border-radius:9px; width:100%; color:var(--ink); background:#fff}
  .gi-input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .gi-hint{font-family:-apple-system,sans-serif; font-size:.8rem; color:var(--muted)}
  /* data table */
  .qtable-wrap{margin:0 0 1rem; overflow-x:auto}
  .qtable{border-collapse:collapse; width:100%; font-family:-apple-system,sans-serif; font-size:.95rem}
  .qtable th,.qtable td{border:1px solid var(--ink); padding:.5rem .7rem; text-align:center}
  .qtable th{font-weight:700; background:#f4f6f8}

  /* question side */
  .qmeta{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:.72rem; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem}
  .readlabel{font-size:.98rem; margin:.1rem 0 .55rem}
  .qbox{border:1px solid var(--ink); border-radius:2px; padding:.8rem .9rem; margin:0 0 .9rem; line-height:1.55; font-size:.98rem; background:#fff}
  .qprompt{font-size:1.04rem; line-height:1.5; margin:.2rem 0 1rem}
  .choices{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:.55rem}
  .choice{
    display:flex; gap:.7rem; align-items:flex-start; border:1px solid var(--line);
    border-radius:9px; padding:.7rem .8rem; cursor:pointer; background:#fff; transition:.12s;
    line-height:1.5; font-size:1rem;
  }
  .choice:hover{border-color:#9fb4d4; background:#f7faff}
  .choice input{margin:.28rem 0 0; accent-color:var(--accent); width:16px; height:16px; flex:none}
  .choice .lbl{font-weight:700; margin-right:.1rem}
  .choice.sel{border-color:var(--accent); background:var(--accent-soft)}
  .choice .ltr{font-weight:700; flex:none; min-width:1.1rem}

  /* set nav (within passage) */
  .setnav{display:flex; flex-wrap:wrap; gap:.4rem; margin-top:1.1rem; padding-top:.9rem; border-top:1px dashed var(--line)}
  .setnav .dot{
    font-family:-apple-system,sans-serif; font-size:.82rem; width:30px; height:30px; border-radius:7px;
    border:1px solid #b9c2cc; background:#fff; cursor:pointer; display:grid; place-items:center; color:var(--ink-soft);
  }
  .setnav .dot.here{background:var(--accent); color:#fff; border-color:var(--accent-dark); font-weight:700}
  .setnav .dot.done{border-color:var(--accent); color:var(--accent)}
  .setnav .setlabel{font-family:-apple-system,sans-serif; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); width:100%; margin-bottom:.1rem}
</style>
</head>
<body>
<style>
  /* full-screen intents (start / section / directions / results) */
  .sheet{max-width:820px; margin:1.6rem auto; padding:0 1rem}
  .sheet .card{padding:2rem 2.2rem}
  .kicker{font-family:-apple-system,sans-serif; font-size:.74rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); text-align:center}
  .h-title{text-align:center; font-size:1.5rem; margin:.35rem 0 .2rem}
  .h-sub{text-align:center; color:var(--ink-soft); margin:0 0 1.3rem}
  .rule{height:1px; background:var(--line); margin:1.3rem 0}
  .dir-head{text-align:center; font-weight:700; letter-spacing:.02em; margin:.2rem 0}
  .dir-body{border:1px solid var(--ink); border-radius:3px; padding:1rem 1.15rem; line-height:1.6; font-size:1rem; margin-top:1rem}
  .choose{display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1.4rem}
  @media(max-width:620px){.choose{grid-template-columns:1fr}}
  .pick{
    text-align:left; border:1px solid var(--line); border-radius:12px; padding:1.2rem 1.25rem; background:#fff; cursor:pointer;
    font-family:-apple-system,sans-serif; transition:.14s;
  }
  .pick:hover:not(:disabled){border-color:var(--accent); box-shadow:0 3px 12px rgba(31,95,191,.12); transform:translateY(-1px)}
  .pick:disabled{opacity:.5; cursor:not-allowed}
  .pick h3{margin:.1rem 0 .3rem; font-size:1.12rem; font-family:Georgia,serif}
  .pick p{margin:0; color:var(--muted); font-size:.9rem}
  .pick .tag{display:inline-block; margin-top:.6rem; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--accent); font-weight:700}
  .pick .tag.soon{color:var(--muted)}
  .cta-row{display:flex; justify-content:center; margin-top:1.6rem}
  .cta{
    font-family:-apple-system,sans-serif; font-size:1rem; font-weight:600; border:1px solid var(--accent-dark);
    background:var(--accent); color:#fff; border-radius:9px; padding:.8rem 1.8rem; cursor:pointer;
  }
  .cta:hover{background:var(--accent-dark)}
  .cta.ghost{background:#fff; color:var(--accent); }
  .note{font-family:-apple-system,sans-serif; font-size:.86rem; color:var(--muted); text-align:center; margin-top:1rem; line-height:1.5}
  .lockmsg{font-family:-apple-system,sans-serif; background:#fff8ea; border:1px solid #f0dfae; color:#7a5c17; border-radius:8px; padding:.6rem .8rem; font-size:.82rem; margin-top:1rem; display:flex; gap:.5rem; align-items:flex-start}

  /* results */
  .res-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:.5rem; margin-top:1.2rem}
  .res-cell{border:1px solid var(--line); border-radius:8px; padding:.55rem .6rem; font-family:-apple-system,sans-serif; display:flex; align-items:baseline; gap:.5rem}
  .res-cell .rn{font-size:.78rem; color:var(--muted); min-width:1.7rem}
  .res-cell .ra{font-size:1.05rem; font-weight:700; color:var(--ink)}
  .res-cell .ra.blank{color:#c25; font-weight:600; font-size:.82rem}
  .res-section{grid-column:1/-1; font-family:-apple-system,sans-serif; text-transform:uppercase; letter-spacing:.05em; font-size:.72rem; color:var(--muted); margin:.8rem 0 .1rem; border-bottom:1px solid var(--line); padding-bottom:.3rem}
  .print-row{display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap; margin-top:1.6rem}

  @media print{
    .toolbar,.crumb,.print-row,.note{display:none !important}
    body{background:#fff}
    .sheet{margin:0; max-width:100%}
    .sheet .card{border:none; box-shadow:none; padding:0}
    .res-cell{break-inside:avoid}
  }
</style>

<script>window.__TEST_DATA__ = {"testName": "SHSAT Practice Test A", "sections": {"ela": {"name": "English Language Arts", "totalQuestions": 57, "groups": [{"type": "re_a", "heading": "Revising/Editing Part A", "directions": "Read the passage below and answer the questions following it. You will be asked to improve the writing quality of the passage and to correct errors so that the passage follows the conventions of standard written English. You should reread relevant parts of the passage, while being mindful of time, before selecting the <b>best</b> answer for each question.", "passageTitle": "The Importance of Sleep", "passageBody": "(1) People will often reduce their sleep for careers, family schedules, or even a movie. (2) If insufficient sleep is a routine in your life, you may be at an increased risk for diabetes, obesity, heart disease, poor mental health, and even death. (3) Even one night of insufficient sleep can have a strong impact on you the next day.\n\n(4) How much sleep you need fluctuates as you get older. (5) Scientists recommend that you get a certain amount of sleep as you age. (6) To prevent dementia in old age, some scientists recommend keeping your brain active by playing games.\n\n(7) There are some important practices that can help your sleep health. (8) Be consistent: head to bed at the same time every night and wake up at the same time in the morning, including on the weekends. (9) Make sure your bedroom is silent, dim, calming, and at a comfortable temperature. (10) Avoid large meals, coffee, and alcoholic drinks before bedtime.\n\n(11) Better sleep habits can improve the quality of your sleep. (12) Getting sufficient sleep is important, but good sleep quality is also necessary. (13) Good sleep is difficult to define, but indicators of bad sleep are unmistakable. (14) These include feeling sleepy or tired even after getting enough sleep, constantly waking up during the night, and having symptoms of sleep disorders (such as snoring or gasping for air). (15) It's important to identify these indicators because they can lead to better habits.", "questions": [{"prompt": "Which transition word or phrase should be added to the beginning of sentence 2?", "choices": ["As a result,", "However,", "Therefore,", "Regardless,"], "num": 1}, {"prompt": "Which sentence could best follow sentence 3 and support the main point of the fourth paragraph?", "choices": ["A third of U.S. adults report that they usually get less than the recommended amount of sleep.", "Sleeping aids, such as melatonin and CPAP machines, can help solve for the lack of sleep.", "You're more likely to feel sleepy, be in a bad mood, be less productive at work, and be involved in a motor vehicle crash.", "It is unlikely that most people will do something about this neglected issue."], "num": 2}, {"prompt": "Which revision of sentence 5 uses the most precise language?", "choices": ["Scientists recommend that a person get more sleep as they grow older.", "The American Academy of Sleep Medicine and the Sleep Research Society recommend more sleep as people age.", "The American Academy of Sleep Medicine and the Sleep Research Society recommend 9 to 12 hours for school-aged children, 8 to 10 for teens, and 7 or more for adults.", "The American Academy of Sleep Medicine and the Sleep Research Society recommend more sleep for more people of different ages, shapes, and sizes."], "num": 3}, {"prompt": "Which sentence best follows the structure and style of the sentences in paragraph 3 (sentences 7–10)?", "choices": ["Get some exercise because being physically active during the day can help you fall asleep more easily at night.", "If you get some exercise, then being physically active during the day can help you fall asleep more easily at night.", "Physical activity during the day can help you fall asleep with exercise.", "Being physically active by getting some exercise can help you fall asleep more easily at night."], "num": 4}, {"prompt": "Where should sentence 11 be moved to improve the organization of the fourth paragraph (sentences 11–15)?", "choices": ["between sentence 12 and 13", "between sentence 13 and 14", "between sentence 14 and 15", "after sentence 15"], "num": 5}, {"prompt": "Which sentence is irrelevant in the passage and should be deleted?", "choices": ["sentence 1", "sentence 6", "sentence 9", "sentence 12"], "num": 6}]}, {"type": "re_b", "heading": "Revising/Editing Part B", "directions": "Read and answer each of the following questions. You will be asked to recognize and correct errors in sentences or short paragraphs. Select the <b>best</b> answer for each question.", "questions": [{"readLabel": "Read this paragraph.", "box": "(1) People often associate monosodium glutamate better known as MSG, with headaches and nausea, but there was no evidence to substantiate that link. (2) In fact, the compounds associated with MSG are commonly found in beef, pork, or chicken. (3) Scientists believe the sicknesses might be the result of a “nocebo effect.” (4) The nocebo effect, like the placebo effect, isn't caused by an actual substance but merely by suggestion.", "prompt": "How should this paragraph be revised?", "choices": ["Sentence 1: Change was to is, AND insert a comma after glutamate.", "Sentence 2: Change associated to associating, AND delete comma after pork.", "Sentence 3: Change believe to believed, AND insert a comma after believe.", "Sentence 4: Change caused to cause, AND delete comma after effect."], "num": 7}, {"readLabel": "Read this sentence.", "box": "Typically occurring in the spring, a nor'easter, a gigantic cyclone, gets its name from the direction of the winds, that tend to blow northeast to southwest.", "prompt": "Which edit should be made to correct this sentence?", "choices": ["Delete the comma after spring.", "Delete the comma after nor'easter.", "Delete the comma after cyclone.", "Delete comma after winds."], "num": 8}, {"readLabel": "Read this paragraph.", "box": "(1) Molasses syrup, a product made from sugar and beets, are primarily used for sweetening foods. (2) Molasses syrup is rich with glucose and fructose, compounds rich in energy. (3) Because of its taste, sugar molasses syrup is used for human consumption, while beet molasses syrup is used for animal consumption. (4) Because of its adhesive properties, molasses syrup is also used as an additive component in mortar for brickwork.", "prompt": "Which sentence should be revised to correct a subject-verb agreement?", "choices": ["sentence 1", "sentence 2", "sentence 3", "sentence 4"], "num": 9}, {"readLabel": "Read these sentences.", "box": "(1) In ancient Greece, there were two major philosophical schools. (2) Stoicism advocated a quiet contemplation. (3) Epicureanism pursued worldly pleasures.", "prompt": "What is the best way to combine these sentences?", "choices": ["In ancient Greece, there were two major philosophical schools, and one was Stoicism, which advocated a quiet contemplation, and the other was Epicureanism, which pursued worldly pleasures.", "In the two major philosophical schools of ancient Greece, Stoicism advocated a quiet contemplation, while Epicureanism pursued worldly pleasures.", "While Stoicism advocated a quiet contemplation, Epicureanism pursued worldly pleasure, and these were the two major philosophical schools of ancient Greece.", "The two major philosophical schools, one being Stoicism that advocated quiet contemplation and the other being Epicureanism that pursued worldly pleasures, were in ancient Greece."], "num": 10}]}, {"type": "rc", "heading": "Reading Comprehension", "passageTitle": "Bringing the Ocean Home", "passageAttribution": "The following passage has been adapted from Bernd Brunner's essay <i>Bringing the Ocean Home</i>. It appears in <i>The Public Domain Review</i>.", "paragraphs": ["The popularization of observing the interaction between marine animals and aquatic plants in glass tanks can be attributed to the Englishman Philip Henry Gosse, who was the first person to resolutely use the word “aquarium” for such objects. In his 1853 book <i>A Naturalist's Rambles on the Devonshire Coast</i>, the Latin term “vivarium” was used interchangeably with “marine aquarium,” but one year later the die was cast for the latter in his book <i>The Aquarium: An Unveiling of the Wonders of the Deep Sea</i>.", "Gosse was born in 1810 in Poole in the south of England, the son of an impoverished travelling miniature painter. As a young man Gosse made his way across the Atlantic to Newfoundland, where he dealt with seal and cod fleets in the Carbonear harbour. In his early twenties he devoted himself wholeheartedly to collecting insects. For two years he documented every insect he could get hold of. Along with some of his friends, he decided to move to mainland Canada in hopes of establishing a rural commune and opening a museum of stuffed birds. After both ventures failed, Gosse returned to England, where he found work as a teacher in Hackney until he received an invitation from the Society for the Promotion of Christian Knowledge to write several books, which led to unexpected success. Gosse's newfound notoriety led to an invitation to Jamaica later that year, and his time in the Caribbean gave birth to three further books, all successes, and the author established himself as an important voice among the publishing naturalists of the period.", "Of all Gosse's works, the most successful was <i>The Aquarium</i>, in which he described his observations of coastal life and—a year after establishing the first public aquarium at the London Zoo—gave his readers instructions on how to build a miniature ocean of their very own. A saltwater aquarium, he asserted, was the perfect way to get acquainted with the peculiar creatures of the aquarium without having to descend into the depths using complicated diving equipment. He was amused by a French zoologist, Henri Milne-Edwards, who stalked around at the bottom of the Mediterranean wearing a “water-tight dress, suitable spectacles, and a breathing tube” in order to take a closer look at the submarine world. All this was so much easier to achieve, Gosse proclaimed, in the safe environment of one's own four walls.", "<i>The Aquarium</i> was more than a cultural sensation: it was also a financial success. A year later, a smaller <i>Handbook to the Marine Aquarium</i> was published for those who had not been able to afford the first book. From the collecting of ferns, the Victorian citizen now turned their attention toward the exploitation of the coastal regions. The rapidly expanding middle class found this new fad a topic suitable for conversation as well as education. As Henry D. Butler retrospectively wrote about the British aquarium mania in his book <i>The Family Aquarium</i>—“The aquarium was on everybody's lip. The aquarium rang in every body's ear. Morning, noon, and night, it was nothing but the aquarium.”"], "questions": [{"prompt": "Which statement best describes the central idea of the passage?", "choices": ["Philip Henry Gosse's innovative work did not receive the recognition it deserved until much later, after its financial success.", "Philip Henry Gosse overcame remarkable challenges and difficulties to produce an aquarium, which would change the way we understood the world underwater.", "Philip Henry Gosse's invention was initially acknowledged as a powerful way to understand the ways organisms live under the sea, but many people eventually lost interest as it grew in popularity.", "Philip Henry Gosse's dedication to his work eventually led to the creation of the aquarium, which provided a number of benefits to researchers and the public alike."], "num": 11}, {"prompt": "Gosse believed that his invention could be beneficial by", "choices": ["making the marine diving techniques simpler and easier to accomplish.", "providing a wealth of knowledge about environmental pollution.", "helping ordinary citizens explore a world that is normally inaccessible.", "collecting flora and fauna from a wide variety of environments."], "num": 12}, {"prompt": "What is most likely the reason the author uses the clause “the die was cast” in paragraph 1?", "choices": ["to suggest that an outcome was set", "to create an element of despair", "to highlight the importance of a hardworking mindset", "to foreshadow the impact of luck in any kind of success"], "num": 13}, {"prompt": "Which sentence best shows that Gosse's dedication contributed to his success?", "choices": ["“The popularization of observing the interaction between marine animals and aquatic plants in glass tanks can be attributed to the Englishman Philip Henry Gosse, who was the first person to resolutely use the word ‘aquarium’ for such objects.” (paragraph 1)", "“In his early twenties he devoted himself wholeheartedly to collecting insects.” (paragraph 2)", "“After both ventures failed, Gosse returned to England, where he found work as a teacher in Hackney until he received an invitation from the Society for the Promotion of Christian Knowledge to write several books, which led to unexpected success.” (paragraph 2)", "“All this was so much easier to achieve, Gosse proclaimed, in the safe environment of one's own four walls.” (paragraph 3)"], "num": 14}, {"prompt": "Which claim is best supported by the information in paragraph 2?", "choices": ["Gosse's success can be attributed primarily to luck.", "Gosse might not have gained his dedication and devotion to work if he had not been born into an impoverished family.", "Gosse did not always experience success in his work.", "Gosse became the most important naturalist in the 19th century."], "num": 15}, {"prompt": "Which impact did Gosse's invention have on the people of his time?", "choices": ["It popularized the usage of Latin in naming inventions.", "It reduced the price of exploring the submarine environments.", "It led to the exploitation of precious coastal resources.", "It contributed to the increased emphasis on the importance of the environment."], "num": 16}]}, {"type": "rc", "heading": "Reading Comprehension", "passageTitle": "John Honeyman and the Battle of Trenton", "passageAttribution": "", "paragraphs": ["Intelligence played a significant role in the Revolutionary War. General George Washington's victory over Hessian forces—or German regiments hired by the British—at the Battle of Trenton on December 26, 1776, ranks as an occasion where intelligence properly gathered and utilized secured a major Patriot victory. The Battle of Trenton and the war might have turned out completely different without the help of a willing double agent: John Honeyman.", "The Battle of Trenton, New Jersey, marked the first major American victory in the Revolutionary War. Prior to this time, Patriot forces had endured nearly constant defeat as the British pushed them from New York and into Pennsylvania. The Continental Congress pleaded for a victory to save the cause.", "In response, Washington decided to attack the exposed Hessian garrison at Trenton, comprised of roughly 1,400 men in three regiments under the command of Col. Johann Rall. Washington's plan depended on surprise and on intelligence provided by John Honeyman.", "Born in Ireland, Honeyman was the son of a poor farmer. Although he had little formal education, he learned several trades and taught himself to read and write. At age 29, he enlisted in the British Army and served with distinction in the French and Indian War. Honeyman moved to Philadelphia in 1775 and met George Washington while he was there to attend meetings of the Continental Congress. Although he had served the British, Honeyman was sympathetic to the Americans and offered his services to Washington.", "Posing as a Loyalist, Honeyman moved to Griggstown, New Jersey, where he practiced his trades as a butcher and weaver. A recognized wartime hero, he moved freely within the town and gathered intelligence about British and Hessian forces. Honeyman then arranged his capture by Continental forces and met with Washington, providing details on the strength, location, morale, and security arrangements of the Hessian troops. With Washington's help, Honeyman escaped and returned to Trenton where he told Colonel Rall of his feigned capture and escape, reporting that the Continental Army was in such a low state of morale that it could not attack.", "On Christmas night, Washington crossed the swollen Delaware River with 2,400 soldiers and made the long, cold march over muddy roads to Trenton. When Continental forces attacked after dawn, 300 surprised Hessians surrendered immediately, as the remainder struggled to mount a defense. When the brief battle had ended, the Americans counted a handful of casualties, while the Hessians lost more than 1,000 men, including 918 prisoners. All four Hessian colonels, including Rall, were killed. By noon, Continental forces had moved safely back across the Delaware, giving the Continental Congress and the Patriot cause a wonderful Christmas gift: new confidence and hope."], "questions": [{"readLabel": "Read this sentence from paragraph 1.", "box": "General George Washington's victory over Hessian forces—or German regiments hired by the British—at the Battle of Trenton on December 26, 1776, ranks as an occasion where intelligence properly gathered and utilized secured a major Patriot victory.", "prompt": "What does the author's comment reveal about the nature of the victory?", "choices": ["The victory required more than superior arms and manpower.", "Most Americans did not believe that they would be victorious.", "The Battle of Trenton was one of the most important battles to contribute to American victory.", "The German regiments lost to the George Washington's forces because they were not intelligent."], "num": 17}, {"prompt": "Which statement is best supported by paragraph 2?", "choices": ["The Battle of Trenton was more important than any other victory during the American Revolution.", "The Patriot forces suffered only defeat prior to the victory at Trenton.", "Pennsylvania was easier to defend than New York.", "Support for the war would have been difficult without the victory at Trenton."], "num": 18}, {"prompt": "How does paragraph 3 contribute to the development of ideas in the passage?", "choices": ["It highlights Washington's ability to identify a key weakness of the Hessian forces.", "It explains the importance of intelligence in military victories.", "It provides the context to introduce John Honeyman's role in the victory.", "It creates an important setting that the author will use to describe the Hessian victory."], "num": 19}, {"prompt": "Which sentence is the best summary of how John Honeyman became involved in the American Revolution?", "choices": ["John Honeyman was commissioned by the Continental Congress, which later assigned him to serve under George Washington's command.", "George Washington learned of John Honeyman's impressive record at the French and Indian War and drafted him into his service.", "John Honeyman met George Washington and decided to serve under Washington because of his feelings about Americans.", "John Honeyman taught himself to read and write, which led to his gradual understanding that the British needed to be repelled from America."], "num": 20}, {"prompt": "Honeyman helped Washington's forces primarily by", "choices": ["leading a raid against Hessian forces.", "spreading misinformation about the Hessian forces while working as a butcher and a weaver.", "confusing the Hessian forces about the location of the Continental Army.", "misrepresenting the condition of the Continental Army."], "num": 21}, {"prompt": "Which sentence best exemplifies Honeyman's contribution to the American cause?", "choices": ["“Intelligence played a significant role in the Revolutionary War.” (paragraph 1)", "“The Continental Congress pleaded for a victory to save the cause.” (paragraph 2)", "“With Washington's help, Honeyman escaped and returned to Trenton where he told Colonel Rall of his feigned capture and escape, reporting that the Continental Army was in such a low state of morale that it could not attack.” (paragraph 5)", "“By noon, Continental forces had moved safely back across the Delaware, giving the Continental Congress and the Patriot cause a wonderful Christmas gift: new confidence and hope.” (paragraph 6)"], "num": 22}, {"prompt": "In paragraph 6, the word “handful” is used to highlight", "choices": ["the difficulty the Continental Army had to overcome in order to achieve victory.", "the extent of the success achieved by the Continental Army.", "the resourceful efforts of Honeyman that contributed to Washington's victory.", "the weakness of the Hessian army prior to Washington's attack."], "num": 23}, {"prompt": "What is implied by the phrase “a wonderful Christmas gift” (paragraph 6)?", "choices": ["The Hessians were overly generous in their behavior toward Americans.", "People can find a way to celebrate the spirit of Christmas even during war.", "The victory renewed American faith in the revolution.", "The celebration of Christmas is a time-honored tradition that can be traced back to the American Revolution."], "num": 24}]}, {"type": "rc", "heading": "Reading Comprehension", "passageTitle": "Excerpt from The Scarlet Letter", "passageAttribution": "By Nathaniel Hawthorne", "numberedParagraphs": true, "paragraphs": ["One peculiarity of the child's deportment remains yet to be told. The very first thing which she had noticed in her life, was—what?—not the mother's smile, responding to it, as other babies do, by that faint, embryo smile of the little mouth, remembered so doubtfully afterwards, and with such fond discussion whether it were indeed a smile. By no means! But that first object of which Pearl seemed to become aware was—shall we say it?—the scarlet letter on Hester's bosom! One day, as her mother stooped over the cradle, the infant's eyes had been caught by the glimmering of the gold embroidery about the letter; and putting up her little hand she grasped at it, smiling, not doubtfully, but with a decided gleam, that gave her face the look of a much older child. Then, gasping for breath, did Hester Prynne clutch the fatal token, instinctively endeavouring to tear it away, so infinite was the torture inflicted by the intelligent touch of Pearl's baby-hand. Again, as if her mother's agonised gesture were meant only to make sport for her, did little Pearl look into her eyes, and smile. From that epoch, except when the child was asleep, Hester had never felt a moment's safety: not a moment's calm enjoyment of her. Weeks, it is true, would sometimes elapse, during which Pearl's gaze might never once be fixed upon the scarlet letter; but then, again, it would come at unawares, like the stroke of sudden death, and always with that peculiar smile and odd expression of the eyes.", "Once this freakish, elvish cast came into the child's eyes while Hester was looking at her own image in them, as mothers are fond of doing; and suddenly for women in solitude, and with troubled hearts, are pestered with unaccountable delusions she fancied that she beheld, not her own miniature portrait, but another face in the small black mirror of Pearl's eye. It was a face, fiend-like, full of smiling malice, yet bearing the semblance of features that she had known full well, though seldom with a smile, and never with malice in them. It was as if an evil spirit possessed the child, and had just then peeped forth in mockery. Many a time afterwards had Hester been tortured, though less vividly, by the same illusion.", "In the afternoon of a certain summer's day, after Pearl grew big enough to run about, she amused herself with gathering handfuls of wild flowers, and flinging them, one by one, at her mother's bosom; dancing up and down like a little elf whenever she hit the scarlet letter. Hester's first motion had been to cover her bosom with her clasped hands. But whether from pride or resignation, or a feeling that her penance might best be wrought out by this unutterable pain, she resisted the impulse, and sat erect, pale as death, looking sadly into little Pearl's wild eyes. Still came the battery of flowers, almost invariably hitting the mark, and covering the mother's breast with hurts for which she could find no balm in this world, nor knew how to seek it in another. At last, her shot being all expended, the child stood still and gazed at Hester, with that little laughing image of a fiend peeping out—or, whether it peeped or no, her mother so imagined it—from the unsearchable abyss of her black eyes.", "“Child, what art thou?” cried the mother.", "“Oh, I am your little Pearl!” answered the child.", "But while she said it, Pearl laughed, and began to dance up and down with the humoursome gesticulation of a little imp, whose next freak might be to fly up the chimney.", "“Art thou my child, in very truth?” asked Hester.", "Nor did she put the question altogether idly, but, for the moment, with a portion of genuine earnestness; for, such was Pearl's wonderful intelligence, that her mother half doubted whether she were not acquainted with the secret spell of her existence, and might not now reveal herself.", "“Yes; I am little Pearl!” repeated the child, continuing her antics.", "“Thou art not my child! Thou art no Pearl of mine!” said the mother half playfully; for it was often the case that a sportive impulse came over her in the midst of her deepest suffering. “Tell me, then, what thou art, and who sent thee hither?”", "“Tell me, mother!” said the child, seriously, coming up to Hester, and pressing herself close to her knees. “Do thou tell me!”", "“Thy Heavenly Father sent thee!” answered Hester Prynne.", "But she said it with a hesitation that did not escape the acuteness of the child. Whether moved only by her ordinary freakishness, or because an evil spirit prompted her, she put up her small forefinger and touched the scarlet letter.", "“He did not send me!” cried she, positively. “I have no Heavenly Father!”", "“Hush, Pearl, hush! Thou must not talk so!” answered the mother, suppressing a groan. “He sent us all into the world. He sent even me, thy mother. Then, much more thee! Or, if not, thou strange and elfish child, whence didst thou come?”", "“Tell me! Tell me!” repeated Pearl, no longer seriously, but laughing and capering about the floor. “It is thou that must tell me!”", "But Hester could not resolve the query, being herself in a dismal labyrinth of doubt. She remembered—betwixt a smile and a shudder—the talk of the neighbouring townspeople, who, seeking vainly elsewhere for the child's paternity, and observing some of her odd attributes, had given out that poor little Pearl was a demon offspring: such as, ever since old Catholic times, had occasionally been seen on earth, through the agency of their mother's sin, and to promote some foul and wicked purpose. Luther, according to the scandal of his monkish enemies, was a brat of that hellish breed; nor was Pearl the only child to whom this inauspicious origin was assigned among the New England Puritans."], "questions": [{"prompt": "Over the course of the passage, the primary focus shifts from", "choices": ["a character's inner thoughts to observations made by other characters.", "an exchange between two strangers to casual disagreement.", "a description of a relationship between two characters to a particular moment involving the two characters.", "the physical setting of a scene to the different aspects of a character's personality traits."], "num": 25}, {"prompt": "In paragraph 1, how do the words “caught by the glimmer gold embroidery” contribute to the meaning of the paragraph?", "choices": ["It highlights the excitement of a pending revelation.", "It suggests a captivating aspect of a physical object.", "It emphasizes the oppressive relationship between the two characters.", "It exaggerates the wealth one character is intent on keeping hidden."], "num": 26}, {"prompt": "The line “that gave her face the look” in paragraph 1 evokes Pearl's", "choices": ["hatred toward the other character.", "appearance that belies her age.", "desire to act mature.", "concern about what others will think of her."], "num": 27}, {"prompt": "Which of the following best reflects Hester's belief that the child is both disturbing yet familiar?", "choices": ["“Once this freakish, elvish cast came into the child's eyes while Hester was looking at her own image in them, as mothers are fond of doing.” (paragraph 2)", "“It was as if an evil spirit possessed the child, and had just then peeped forth in mockery.” (paragraph 2)", "“In the afternoon of a certain summer's day, after Pearl grew big enough to run about, she amused herself with gathering handfuls of wild flowers, and flinging them, one by one, at her mother's bosom” (paragraph 3)", "“But whether from pride or resignation, or a feeling that her penance might best be wrought out by this unutterable pain, she resisted the impulse, and sat erect, pale as death, looking sadly into little Pearl's wild eyes.” (paragraph 3)"], "num": 28}, {"readLabel": "Read this text from paragraphs 4 to 10.", "box": "“Child, what art thou?” cried the mother. “Oh, I am your little Pearl!” answered the child. But while she said it, Pearl laughed, and began to dance up and down with the humoursome gesticulation of a little imp, whose next freak might be to fly up the chimney. “Art thou my child, in very truth?” asked Hester. Nor did she put the question altogether idly, but, for the moment, with a portion of genuine earnestness; for, such was Pearl's wonderful intelligence, that her mother half doubted whether she were not acquainted with the secret spell of her existence, and might not now reveal herself. “Yes; I am little Pearl!” repeated the child, continuing her antics. “Thou art not my child! Thou art no Pearl of mine!” said the mother half playfully; for it was often the case that a sportive impulse came over her in the midst of her deepest suffering. “Tell me, then, what thou art, and who sent thee hither?”", "prompt": "This dialogue suggests that Hester's attitude toward the child can best be described as", "choices": ["pure joy.", "careless indifference.", "complete despair.", "anxious concern."], "num": 29}, {"prompt": "Which of the following best suggests that Pearl is not unique in her circumstance?", "choices": ["“Then, gasping for breath, did Hester Prynne clutch the fatal token, instinctively endeavouring to tear it away, so infinite was the torture inflicted by the intelligent touch of Pearl's baby-hand.” (paragraph 1)", "“she fancied that she beheld, not her own miniature portrait, but another face in the small black mirror of Pearl's eye” (paragraph 2)", "“He did not send me!' cried she, positively. 'I have no Heavenly Father!'” (paragraph 3)", "“Luther, according to the scandal of his monkish enemies, was a brat of that hellish breed; nor was Pearl the only child to whom this inauspicious origin was assigned among the New England Puritans.” (paragraph 17)"], "num": 30}, {"prompt": "In paragraph 17, the “townspeople” are characterized primarily as", "choices": ["arrogant.", "boastful.", "egotistical.", "judgmental."], "num": 31}, {"prompt": "Which of the following best reveals Pearl's perceptive nature?", "choices": ["“But she said it with a hesitation that did not escape the acuteness of the child.” (paragraph 13)", "“Whether moved only by her ordinary freakishness, or because an evil spirit prompted her, she put up her small forefinger and touched the scarlet letter.” (paragraph 13)", "“She remembered—betwixt a smile and a shudder—the talk of the neighbouring townspeople, who, seeking vainly elsewhere for the child's paternity, and observing some of her odd attributes, had given out that poor little Pearl was a demon offspring.” (paragraph 17)", "“nor was Pearl the only child to whom this inauspicious origin was assigned among the New England Puritans.” (paragraph 17)"], "num": 32}]}, {"type": "rc", "heading": "Reading Comprehension", "passageTitle": "Divining the Witch of York", "passageAttribution": "The following passage has been adapted from Ed Simon's essay <i>Divining the Witch of York</i>. It appears in <i>The Public Domain Review</i>.", "numberedParagraphs": true, "paragraphs": ["Most sources claimed that Ursula Soothtell died during the rule of Elizabeth I in 1561, but with eight decades separating her supposed death and the first appearance of her name in print, it's fair to assume a degree of invention in her biography. Despite her legendary ugliness (Ursula's seventeenth-century biographer described her as “a thing so strange in an infant, that no age can parallel”), at the age of twenty-four she married a carpenter named Toby Shipton, and it is to posterity that she would come to be known as “Mother Shipton.” A less appropriate surname, because as “Smith” and “Taylor” indicate profession, so too did “Soothtell.”", "Mother Shipton would become the most famed of soothe tellers in English history, renowned for her prophecies and used as a symbolic familiar in the art of divination for generations, the very constructed personage of the seer, a work of poetry unto herself. Mother Shipton, England's Nostradamus, the sixteenth-century Sibyl, the Yorkshire prophetess, the Knaresborough witch whose crooked face has stared out from prints hanging on occultist's walls and in the names of country pubs since the initial printing of her predictions in 1641, should serve as a potent point of reflection for what exactly we talk about when we talk about prophecies.", "Some scholars have argued that she is a complete fiction. There are those, however, that argue she was in some way an actual person, embellished through local tradition into a folk legend. There is at least one clue earlier than the seventeenth century which indicates that the prophetess may be based in more than pure invention. In 1537, as Catholic rebels in Yorkshire rebelled against Henry VIII and his dissolution of the monasteries, the assailed king wrote a letter to the Duke of Norfolk in which he disdainfully refers to a “witch of York.” It is perhaps the earliest reference to what may be the real Mother Shipton. As the anonymous author in an 1868 edition of <i>Notes and Queries</i> concluded, “Although the fact of the existence of Mother Shipton rests wholly upon Yorkshire tradition, she can scarcely be regarded as a myth.”", "One particular title was crucial to the embellishment of her myth, her biography as written by the Irish novelist Richard Head in 1667. Head's <i>The Life and Death of Mother Shipton</i> was responsible for the majority of invented biographical details, building upon the bare narrative scaffolding of dozens of popular pamphlets. From Head's imagination came details such as Agatha's demonic wedding feast with Satan, accounts of magical feats performed by Ursula in front of worthies such as Cardinal Wolsey, and, most enduringly, the graphic and purple description of Mother Shipton's physical appearance, which occupies hundreds of words, describing her as “very morose and big-boned,” with “very great goggling, but sharp and firey eyes; her nose of an incredible and unproportionable length.”", "Head then goes on for several sentences describing said nose in magnificently baroque prose, its “many crooks and turnings,” and its adornment with “many strange pimples of divers colours, as red and blue mixed, which, like vapours of brimstone, gave such a lustre to the affrighted spectators in the dead time of the night, that one of them confessed several times, that her nurse needed no other light” to assist her in the birth of the prophetess. Head offers similarly purple descriptions of Mother Shipton's cheeks, her teeth, her mouth, her neck, her shoulders, her legs, and her toes, telling us that it was as if “her body had been screwed together piece after piece, and not rightly placed.” In short, Head rather cruelly makes clear what Mother Shipton looked like—a witch."], "questions": [{"prompt": "Which statement best describes the central idea of the passage?", "choices": ["Mother Shipton is a fictional character that does not look like the actual person she was modeled after.", "Ursula Soothtell was a tragic character who suffered unnecessary abuse from the people around her.", "Mother Shipton may be modeled after an actual person with unusual characteristics that resemble those commonly associated with a witch.", "The history of Ursula Soothtell was a mystery until historians uncovered a recent finding that confirms her existence."], "num": 33}, {"prompt": "In paragraph 2, how does the following phrase “England's Nostradamus, the sixteenth-century Sibyl, the Yorkshire prophetess, the Knaresborough witch” contribute to the development of the paragraph?", "choices": ["It identifies the key roles Mother Shipton played in the course of her career as a witch.", "It lists the most important witches of Mother Shipton's time.", "It emphasizes the extent of the influence that Mother Shipton developed over time.", "It describes the most influential individuals in the occultist's history."], "num": 34}, {"prompt": "Which sentence from the passage best supports the idea that some believe that Mother Shipton is not a work of fiction?", "choices": ["“Mother Shipton would become the most famed of soothe tellers in English history, renowned for her prophecies and used as a symbolic familiar in the art of divination for generations.” (paragraph 2)", "“Mother Shipton, England's Nostradamus, the sixteenth-century Sibyl, the Yorkshire prophetess, the Knaresborough witch whose crooked face has stared out from prints hanging on occultist's walls and in the names of country pubs.” (paragraph 3)", "“There is at least one clue earlier than the seventeenth century which indicates that the prophetess may be based in more than pure inven <script>
const DATA = window.__TEST_DATA__;
const LETTERS = ["A","B","C","D","E","F","G","H"];

// ---- Build a flat, ordered list of "steps" for a section ----
// Each group becomes: [directions step] + one step per question.
// A "set" = questions sharing a passage (re_a and each rc). re_b items are singletons.
function buildSteps(sectionKey){
  const sec = DATA.sections[sectionKey];
  const steps = [];
  sec.groups.forEach((g, gi)=>{
    const setQnums = g.questions.map(q=>q.num);
    // set is navigable-back if it's a passage group (re_a or rc). re_b => each q standalone.
    const grouped = (g.type === "re_a" || g.type === "rc");
    steps.push({kind:"dir", group:g, gi});
    g.questions.forEach((q, qi)=>{
      steps.push({
        kind:"q", group:g, gi, q,
        setId: grouped ? ("g"+gi) : ("g"+gi+"q"+qi),
        setQnums: grouped ? setQnums : [q.num],
        firstInSet: grouped ? (qi===0) : true
      });
    });
  });
  return steps;
}

const State = {
  sectionOrder:[],      // e.g. ["ela","math"] based on choice
  sectionIdx:0,
  section:null,         // current section key
  steps:[],
  pos:0,                // index into steps
  answers:{},           // num -> letter index
  maxReached:0,         // furthest step index unlocked (forward-only)
  sectionDone:{},       // key -> true
};

const $ = s=>document.querySelector(s);
const app = ()=>document.getElementById('app');

function start(){ renderStart(); }

// ---------- START SCREEN ----------
function renderStart(){
  document.getElementById('toolbar').style.display='none';
  document.getElementById('crumb').style.display='none';
  const ela = DATA.sections.ela, math = DATA.sections.math;
  app().innerHTML = `
   <div class="sheet ui">
    <div class="card">
      <div class="kicker">The New York City Department of Education</div>
      <div class="h-title">${DATA.testName}</div>
      <div class="h-sub">Specialized High Schools Admissions Test &middot; Grade 8</div>
      <p style="text-align:center;line-height:1.6;color:var(--ink-soft);font-family:-apple-system,sans-serif;font-size:.95rem;margin:0 auto;max-width:60ch">
        Choose which section to begin. You can do the sections in either order, but once you move
        past a question you can\u2019t return to it \u2014 except to move between questions that share the
        same reading passage. When you finish, you\u2019ll see a summary of your answers you can print or save as a PDF.
      </p>
      <div class="choose">
        <button class="pick" onclick="beginSection('ela')">
          <h3>${ela.name}</h3>
          <p>Revising/Editing and Reading Comprehension \u00b7 ${ela.totalQuestions} questions</p>
          <span class="tag">Start here &rarr;</span>
        </button>
        <button class="pick" ${math.comingSoon?'disabled':''} onclick="beginSection('math')">
          <h3>${math.name}</h3>
          <p>${math.comingSoon? 'Will be added in a later version.' : 'Begin the mathematics section.'}</p>
          <span class="tag ${math.comingSoon?'soon':''}">${math.comingSoon?'Coming soon':'Start &rarr;'}</span>
        </button>
      </div>
      <div class="note">This is a practice tool. Timing is not enforced; work at your own pace.</div>
    </div>
   </div>`;
}

function beginSection(key){
  State.section = key;
  if(!State.sectionOrder.includes(key)) State.sectionOrder.push(key);
  State.steps = buildSteps(key);
  State.pos = 0;
  State.maxReached = 0;
  document.getElementById('toolbar').style.display='flex';
  document.getElementById('crumb').style.display='flex';
  render();
}
window.beginSection = beginSection;
</script>
<script>
function curStep(){ return State.steps[State.pos]; }
function totalQ(){ return DATA.sections[State.section].groups.reduce((a,g)=>a+g.questions.length,0); }
function answeredCount(){
  const nums = DATA.sections[State.section].groups.flatMap(g=>g.questions.map(q=>q.num));
  return nums.filter(n=>{ const v=State.answers[n]; return v!=null && v!==''; }).length;
}

function updateCrumb(){
  const sec = DATA.sections[State.section];
  $('#cbSection').textContent = (State.section==='ela'?'SECTION 1 \u00b7 ELA':'SECTION 2 \u00b7 MATH');  const st = curStep();
  let where = '';
  if(st.kind==='q'){ where = st.q.num + ' OF ' + totalQ(); }
  else { where = st.group.heading.toUpperCase(); }
  $('#cbWhere').textContent = where;
  const pct = Math.round( answeredCount()/totalQ()*100 );
  $('#cbBar').style.width = pct+'%';
  $('#cbPct').textContent = pct+'%';
}

// ---------- MAIN RENDER ----------
function render(){
  const st = curStep();
  if(st.kind==='dir') renderDirections(st);
  else renderQuestion(st);
  updateNavButtons();
  updateCrumb();
  window.scrollTo({top:0,behavior:'instant'});
}

function renderDirections(st){
  const g = st.group;
  let inner = `<div class="kicker">English Language Arts</div>
     <div class="dir-head" style="font-size:1.15rem;margin-top:.3rem">${g.heading}</div>
     <div class="dir-body"><b>Directions:</b> ${g.directions}</div>`;
  // lock notice: whether this group allows within-set back nav
  const grouped = (g.type==='re_a'||g.type==='rc');
  inner += `<div class="lockmsg"><span>&#9432;</span><span>${
    grouped
    ? 'This set shares one passage. You can move freely <b>between the questions in this set</b>, but once you continue past the set you can\u2019t come back.'
    : 'Each question here stands alone. Once you continue to the next question, you can\u2019t come back to it.'
  }</span></div>
  <div class="cta-row"><button class="cta" onclick="advance()">Begin &rarr;</button></div>`;
  app().innerHTML = `<div class="sheet ui"><div class="card">${inner}</div></div>`;
}

function passageHTML(g){
  if(g.type==='re_a'){
    const paras = g.passageBody.split('\n\n').map(p=>`<p>${p}</p>`).join('');
    return `<div class="panel">
       <div class="passage-scroll">
         <div class="passage-title">${g.passageTitle}</div>
         <div class="ptext">${paras}</div>
       </div></div>`;
  }
  // rc
  let body;
  if(g.isPoem){
    // POEM: line-numbered. Public-domain poems carry their own poemLines.
    let lines = g.poemLines || (window.__POEM_LINES__ && window.__POEM_LINES__[g.passageTitle]) || null;
    if(lines){
      body = '<div class="ptext poem">'+ lines.map((ln,i)=>{
        const num=i+1; const showNum=(num===1||num%5===0);
        return `<p class="pline"><span class="lno">${showNum?num:''}</span>${ln||'&nbsp;'}</p>`;
      }).join('') + '</div>';
    } else {
      body = `<div class="poem-missing">
        <b>Poem text goes here.</b>
        <span>This passage\u2019s questions are ready. To display the poem, add its ${g.lineCount} lines
        to the <code>__POEM_LINES__</code> list near the top of this file (a labeled spot is marked there).
        Line numbers 1, 5, 10, 15, and 20 are referenced by the questions.</span>
      </div>`;
    }
  } else if(g.numberedParagraphs){
    body = g.paragraphs.map((p,i)=>`<p><span class="pn">${i+1}</span>${p}</p>`).join('');
    body = `<div class="ptext numbered">${body}</div>`;
  } else {
    body = `<div class="ptext">${g.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div>`;
  }
  // optional embedded image (e.g. the bear diagram)
  let img='';
  if(g.image && window.__IMAGES__ && window.__IMAGES__[g.image]){
    img = `<figure class="pfig">
      <img src="${window.__IMAGES__[g.image]}" alt="${g.passageTitle} diagram">
      ${g.imageCaption?`<figcaption>${g.imageCaption}</figcaption>`:''}
    </figure>`;
  }
  const attr = g.passageAttribution ? `<div class="passage-attr">${g.passageAttribution}</div>` : '';
  return `<div class="panel">
     <div class="passage-scroll">
       <div class="passage-title">${g.passageTitle}</div>
       ${attr}
       ${body}
       ${img}
     </div></div>`;
}

function fracOrText(c){
  const t = (''+c).trim();
  // mixed number "14 7/20"
  let m = t.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if(m) return `${m[1]}<span class="frac"><span class="num">${m[2]}</span><span class="den">${m[3]}</span></span>`;
  // simple fraction "3/10"
  m = t.match(/^(\d+)\/(\d+)$/);
  if(m) return `<span class="frac"><span class="num">${m[1]}</span><span class="den">${m[2]}</span></span>`;
  return c; // otherwise return as-is (may already contain fraction HTML)
}

function renderQuestion(st){
  const g = st.group, q = st.q;
  const hasPassage = (g.type==='re_a'||g.type==='rc');
  const sel = State.answers[q.num];

  // answer area: grid-in input OR multiple-choice list
  let answerArea;
  if(q.gridIn){
    const cur = (typeof sel==='string') ? sel : '';
    answerArea = `<div class="gridin">
        <label for="gi${q.num}">Enter your answer</label>
        <input id="gi${q.num}" class="gi-input" type="text" inputmode="text"
               autocomplete="off" value="${cur.replace(/"/g,'&quot;')}"
               oninput="typeAnswer(${q.num}, this.value)"
               placeholder="Type a number">
        <span class="gi-hint">This is a grid-in question \u2014 there are no answer choices.</span>
      </div>`;
  } else {
    const choices = q.choices.map((c,i)=>`
       <li class="choice ${sel===i?'sel':''}" onclick="pick(${q.num},${i})">
         <input type="radio" name="q${q.num}" ${sel===i?'checked':''} onclick="event.stopPropagation();pick(${q.num},${i})">
         <span class="ltr">${LETTERS[i]}.</span><span>${fracOrText(c)}</span>
       </li>`).join('');
    answerArea = `<ul class="choices">${choices}</ul>`;
  }

  const readLabel = q.readLabel ? `<div class="readlabel">${q.readLabel}</div>`:'';
  const box = q.box ? `<div class="qbox">${q.box}</div>`:'';
  const dataBox = q.dataBox ? `<div class="databox">${q.dataBox}</div>`:'';
  const tableHTML = q.tableHTML ? `<div class="qtable-wrap">${q.tableHTML}</div>`:'';
  const display = q.display ? `<div class="mdisplay">${q.display}</div>`:'';
  let qimg='';
  if(q.image && window.__IMAGES__ && window.__IMAGES__[q.image]){
    qimg = `<figure class="qfig"><img src="${window.__IMAGES__[q.image]}" alt="figure for question ${q.num}"></figure>`;
  }

  // within-set navigation dots (only if set has >1 q)
  let setnav = '';
  if(st.setQnums.length>1){
    const dots = st.setQnums.map(n=>{
      const cls = (n===q.num)?'here':(State.answers[n]!=null?'done':'');
      return `<button class="dot ${cls}" onclick="gotoNum(${n})">${n}</button>`;
    }).join('');
    setnav = `<div class="setnav"><span class="setlabel">Questions in this passage</span>${dots}</div>`;
  }

  const qside = `<div class="panel">
      <div class="qmeta">Question ${q.num} of ${totalQ()}</div>
      ${readLabel}${box}${dataBox}${tableHTML}
      <div class="qprompt">${q.prompt}</div>
      ${display}${qimg}
      ${answerArea}
      ${setnav}
   </div>`;

  const layout = hasPassage
    ? `<div class="qwrap">${passageHTML(g)}${qside}</div>`
    : `<div class="qwrap single">${qside}</div>`;

  app().innerHTML = `<div class="stage"><div class="card">${layout}</div></div>`;
}

function pick(num, i){
  State.answers[num]=i;
  render();
}
window.pick = pick;

// grid-in: store typed value without full rerender (keeps input focus)
function typeAnswer(num, value){
  const v = value.trim();
  State.answers[num] = (v==='') ? null : v;
  updateCrumb();
}
window.typeAnswer = typeAnswer;
</script>
<script>
// ---------- NAVIGATION ----------
// Forward-only overall. Back allowed ONLY to another question within the same set.
function updateNavButtons(){
  const st = curStep();
  const back = $('#btnBack'), next = $('#btnNext');
  // BACK enabled only if previous step is a question in the SAME set as current question
  let canBack=false;
  if(st.kind==='q' && State.pos>0){
    const prev = State.steps[State.pos-1];
    if(prev.kind==='q' && prev.setId===st.setId) canBack=true;
  }
  back.disabled = !canBack;
  // NEXT: always allowed to move forward (advances / unlocks). On last step it becomes "finish".
  next.disabled=false;
  const last = (State.pos===State.steps.length-1);
  next.textContent = last ? 'Finish' : '\u2192';
  next.title = last ? 'Finish section' : 'Next';
}

function advance(){ goForward(); }
window.advance = advance;

function goForward(){
  const last = (State.pos===State.steps.length-1);
  if(last){ finishSection(); return; }
  State.pos++;
  if(State.pos>State.maxReached) State.maxReached=State.pos;
  render();
}
function goBack(){
  const st = curStep();
  if(st.kind==='q' && State.pos>0){
    const prev = State.steps[State.pos-1];
    if(prev.kind==='q' && prev.setId===st.setId){ State.pos--; render(); }
  }
}
// jump to a specific question number, but only within the current set
function gotoNum(num){
  const st = curStep();
  if(!st.setQnums.includes(num)) return;
  const idx = State.steps.findIndex(s=>s.kind==='q' && s.q && s.q.num===num);
  if(idx>=0){ State.pos=idx; render(); }
}
window.gotoNum = gotoNum;

$('#btnNext').addEventListener('click', goForward);
$('#btnBack').addEventListener('click', goBack);

// ---------- FINISH A SECTION ----------
function finishSection(){
  State.sectionDone[State.section]=true;
  // is there another section available and not done?
  const other = State.section==='ela' ? 'math' : 'ela';
  const otherAvail = !DATA.sections[other].comingSoon && !State.sectionDone[other];
  renderSectionEnd(otherAvail, other);
}

function renderSectionEnd(otherAvail, other){
  document.getElementById('toolbar').style.display='none';
  document.getElementById('crumb').style.display='none';
  const secName = DATA.sections[State.section].name;
  // If another section remains, the ONLY choice is to start it.
  // Answers are shown only at the very end (no mid-test peek).
  let btns, note;
  if(otherAvail){
    btns = `<button class="cta" onclick="beginSection('${other}')">Start ${DATA.sections[other].name} &rarr;</button>`;
    note = `Next, complete the ${DATA.sections[other].name} section. Your answer summary will be available once you finish the whole test.`;
  } else {
    btns = `<button class="cta" onclick="showResults()">See my answer summary</button>`;
    note = `That\u2019s the end of the test. View your answer summary below \u2014 you can print it or save it as a PDF.`;
  }
  app().innerHTML = `<div class="sheet ui"><div class="card" style="text-align:center">
     <div class="kicker">Section complete</div>
     <div class="h-title">You\u2019ve finished ${secName}</div>
     <p class="note" style="max-width:54ch;margin:.4rem auto 0">${note}</p>
     <div class="print-row">${btns}</div>
  </div></div>`;
}
window.showResults = showResults;

// ---------- RESULTS ----------
function showResults(){
  document.getElementById('toolbar').style.display='none';
  document.getElementById('crumb').style.display='none';
  let sectionsHTML='';
  State.sectionOrder.forEach(key=>{
    if(!State.sectionDone[key]) return;
    const sec = DATA.sections[key];
    let cells = `<div class="res-section">${sec.name}</div>`;
    sec.groups.forEach(g=>{
      g.questions.forEach(q=>{
        const a = State.answers[q.num];
        let ans;
        if(q.gridIn){
          ans = (a==null || a==='') ? `<span class="ra blank">\u2014 blank</span>` : `<span class="ra">${(''+a).replace(/</g,'&lt;')}</span>`;
        } else {
          ans = (a==null) ? `<span class="ra blank">\u2014 blank</span>` : `<span class="ra">${LETTERS[a]}</span>`;
        }
        cells += `<div class="res-cell"><span class="rn">${q.num}.</span>${ans}</div>`;
      });
    });
    sectionsHTML += cells;
  });
  const now = new Date();
  const stamp = now.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
  app().innerHTML = `<div class="sheet ui"><div class="card">
     <div class="kicker">${DATA.testName}</div>
     <div class="h-title" style="margin-bottom:.1rem">Answer Summary</div>
     <div class="h-sub">Generated ${stamp}</div>
     <div id="nameLine" class="ui" style="font-family:-apple-system,sans-serif;font-size:.95rem;color:var(--ink-soft);margin:0 0 .4rem">
        Student: <input id="stuName" placeholder="(write name)" style="border:none;border-bottom:1px solid var(--line);font:inherit;padding:.15rem .3rem;min-width:180px" oninput="document.getElementById('stuNamePrint').textContent=this.value">
     </div>
     <div class="res-grid">${sectionsHTML}</div>
     <div class="print-row">
       <button class="cta" onclick="window.print()">Print / Save as PDF</button>
       <button class="cta ghost" onclick="location.reload()">Start over</button>
     </div>
     <div class="note">Tip: in the print dialog, choose \u201cSave as PDF\u201d as the destination to download a copy.</div>
  </div></div>`;
}

// keyboard: right arrow = next
document.addEventListener('keydown',e=>{
  if(document.getElementById('toolbar').style.display==='none') return;
  if(e.key==='ArrowRight'){ goForward(); }
  else if(e.key==='ArrowLeft'){ if(!$('#btnBack').disabled) goBack(); }
});

start();
</script>

</body>
</html>
